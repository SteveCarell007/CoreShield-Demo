<!DOCTYPE html>
<html>
<head>
    <title>CoreShield Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f3f4f6;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 8px 15px;
            background-color: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        .logout {
            background-color: #dc2626;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>CoreShield Dashboard</h1>
    <button class="logout" onclick="window.location.href='index.html'">Logout</button>
</div>

<div class="card">
    <h3>Security Alert</h3>
    <p>Outdated CoreShield Client Detected (Version 4.2.1)</p>
    <p>Status: <strong style="color:red;">High Risk</strong></p>
</div>

<div class="card">
    <h3>Upgrade Required</h3>
    <p>Your current version is no longer supported. Immediate update required to maintain protection.</p>
    <button onclick="window.location.href='upgrade.html'">Upgrade Now</button>
</div>

<div class="card">
    <h3>Device Management</h3>
    <p>Manage authorized devices and monitor threat activity.</p>
</div>

</body>
</html>
