<!DOCTYPE html>
<html>
<head>
    <title>CoreShield | Secure Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1f2937, #111827);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 8px;
            width: 320px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        .company {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="company">CoreShield</div>
        <p>Enterprise Security Portal</p>

        <input type="text" placeholder="Corporate Email">
        <input type="password" placeholder="Password">

        <button onclick="window.location.href='dashboard.html'">
            Sign In
        </button>
    </div>
</body>

</html>
